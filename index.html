      // ─── SUMMARY ───────────────────────────────────────────────────────────────
      let currentSumPeriod = "week";
      function filterSum(period, btn) {
        document
          .querySelectorAll(".sum-period .tab")
          .forEach((t) => t.classList.remove("active"));
        btn.classList.add("active");
        renderSummary(period);
      }
      function renderSummary(period) {
        currentSumPeriod = period;
        const now = new Date();
        let start,
          end = new Date(now),
          label;
        if (period === "week") {
          start = new Date(now);
          start.setDate(now.getDate() - now.getDay());
          start.setHours(0, 0, 0, 0);
          label = "This week";
        } else if (period === "month") {
          start = new Date(now.getFullYear(), now.getMonth(), 1);
          label = now.toLocaleDateString("en-NG", {
            month: "long",
            year: "numeric",
          });
        } else {
          start = new Date(now.getFullYear(), now.getMonth() - 1, 1);
          end = new Date(now.getFullYear(), now.getMonth(), 0, 23, 59, 59);
          label = new Date(start).toLocaleDateString("en-NG", {
            month: "long",
            year: "numeric",
          });
        }
        const items = state.items.filter((i) => {
          const d = new Date(i.createdAt);
          return d >= start && d <= end;
        });
        const collected = items.filter((i) => i.status === "collected");
        const totalIn = items.reduce((a, i) => a + i.total, 0);
        const totalColl = collected.reduce((a, i) => a + totalPaid(i), 0);
        const totalOut = collected
          .filter((i) => !i.settledShort)
          .reduce((a, i) => a + balance(i), 0);
        const el = document.getElementById("sum-content");
        if (!items.length) {
          el.innerHTML = `<div class="empty"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg><p>No records for ${label}</p></div>`;
          return;
        }
        el.innerHTML = `
    <div class="sum-card">
      <div style="font-size:13px;font-weight:600;color:var(--t3);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">${label}</div>
      <div class="sum-row"><span class="sl">Total intakes</span><span class="sv">${items.length}</span></div>
      <div class="sum-row"><span class="sl">Total charged</span><span class="sv ct">${fmt(totalIn)}</span></div>
      <div class="sum-row"><span class="sl">Total collected</span><span class="sv" style="color:var(--green)">${fmt(totalColl)}</span></div>
      <div class="sum-row"><span class="sl">Still drying</span><span class="sv ca">${items.filter((i) => i.status === "drying").length}</span></div>
      <div class="sum-row"><span class="sl">Ready to collect</span><span class="sv ct">${items.filter((i) => i.status === "ready").length}</span></div>
      <div class="sum-row"><span class="sl">Outstanding balance</span><span class="sv cr">${fmt(totalOut)}</span></div>
    </div>
    <div class="slabel">Customers this period</div>
    ${[...new Set(items.map((i) => i.name))]
      .map((name) => {
        const ci = items.filter((i) => i.name === name);
        const ct = ci.reduce((a, i) => a + i.total, 0);
        return `<div class="sum-card" style="cursor:pointer" onclick="openCustomer('${name.replace(/'/g, "\\'")}')"><div style="display:flex;justify-content:space-between"><div><div style="font-size:13px;font-weight:600">${name}</div><div class="itr-meta">${ci.length} visit${ci.length !== 1 ? "s" : ""}</div></div><div style="font-size:14px;font-weight:700;color:var(--teal)">${fmt(ct)}</div></div></div>`;
      })
      .join("")}`;
      }

      // ─── CUSTOMERS ─────────────────────────────────────────────────────────────
      function renderCustomers() {
        const q = (
          document.getElementById("cust-search").value || ""
        ).toLowerCase();
        const map = {};
        state.items.forEach((i) => {
          const key = i.name.toLowerCase();
          if (!map[key])
            map[key] = {
              name: i.name,
              phone: i.phone || "",
              items: [],
              totalBiz: 0,
              totalPaidAmt: 0,
              totalBal: 0,
            };
          map[key].items.push(i);
          map[key].totalBiz += i.total;
          map[key].totalPaidAmt += totalPaid(i);
          if (i.status === "collected" && !i.settledShort)
            map[key].totalBal += balance(i);
        });
        let custs = Object.values(map).sort((a, b) => b.totalBiz - a.totalBiz);
        if (q)
          custs = custs.filter(
            (c) => c.name.toLowerCase().includes(q) || c.phone.includes(q),
          );
        const el = document.getElementById("cust-list");
        if (!custs.length) {
          el.innerHTML =
            '<div class="empty"><svg viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle></svg><p>No customers yet</p></div>';
          return;
        }
        el.innerHTML = custs
          .map(
            (c) => `
    <div class="cust-card" onclick="openCustomer('${c.name.replace(/'/g, "\\'")}')">
      <div class="cust-name">${c.name}</div>
      <div class="cust-meta">${c.phone || "No phone"} · ${c.items.length} visit${c.items.length !== 1 ? "s" : ""}</div>
      <div class="cust-stats">
        <div class="cst">Biz: <strong>${fmt(c.totalBiz)}</strong></div>
        <div class="cst">Paid: <strong style="color:var(--green)">${fmt(c.totalPaidAmt)}</strong></div>
        ${c.totalBal > 0 ? `<div class="cst">Owes: <strong style="color:var(--red)">${fmt(c.totalBal)}</strong></div>` : ""}
      </div>
    </div>`,
          )
          .join("");
      }

      function openCustomer(name) {
        const items = state.items.filter(
          (i) => i.name.toLowerCase() === name.toLowerCase(),
        );
        if (!items.length) return;
        const c = items[0];
        const totalBiz = items.reduce((a, i) => a + i.total, 0);
        const tPaid = items.reduce((a, i) => a + totalPaid(i), 0);
        const tBal = items
          .filter((i) => i.status === "collected" && !i.settledShort)
          .reduce((a, i) => a + balance(i), 0);
        document.getElementById("cust-body").innerHTML = `
    <button class="mclose" onclick="closeCustModal()">Close</button>
    <div class="mtitle">${c.name}</div>
    <div class="msub">${c.phone || "No phone saved"}</div>
    <div class="sgrid" style="margin-bottom:11px">
      <div class="stat"><div class="stat-label">Total business</div><div class="stat-val ct" style="font-size:15px">${fmt(totalBiz)}</div></div>
      <div class="stat"><div class="stat-label">Total paid</div><div class="stat-val" style="font-size:15px;color:var(--green)">${fmt(tPaid)}</div></div>
      <div class="stat"><div class="stat-label">Visits</div><div class="stat-val ct" style="font-size:15px">${items.length}</div></div>
      <div class="stat"><div class="stat-label">Outstanding</div><div class="stat-val cr" style="font-size:15px">${fmt(tBal)}</div></div>
    </div>
    ${
      c.phone
        ? `<div style="display:flex;gap:8px;margin-bottom:12px">
      <button class="btn" style="flex:1" onclick="callCustomer('${c.phone}','${c.name}')"><svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.36 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>Call</button>
      <button class="btn whatsapp" style="flex:1" onclick="sendWhatsApp('${c.phone}','${c.name}','reminder')"><svg viewBox="0 0 24 24" style="fill:none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg>WhatsApp</button>
    </div>`
        : ""
    }
    <div class="slabel">All visits</div>
    ${items
      .map((i) => {
        const fish =
          (i.fishRows || []).map((r) => r.type).join(", ") || i.type || "Fish";
        return `<div class="card" style="cursor:pointer;margin-bottom:7px" onclick="closeCustModal();openItem(${i.id})"><div style="display:flex;justify-content:space-between"><div><div style="font-size:13px;font-weight:600">${fish}</div><div class="itr-meta">${shortDate(i.createdAt)} · <span class="pill ${i.status}">${statusLabel(i.status)}</span>${payStatus(i) ? ' <span class="pill ' + payStatus(i) + '">' + payLabel(i) + "</span>" : ""}</div>${i.notes ? `<div class="itr-meta">📝 ${i.notes}</div>` : ""}</div><div style="text-align:right"><div style="font-size:13px;font-weight:600">${fmt(i.total)}</div>${balance(i) > 0 && !i.settledShort ? `<div class="itr-meta" style="color:var(--red)">Bal: ${fmt(balance(i))}</div>` : ""}</div></div></div>`;
      })
      .join("")}`;
        document.getElementById("cust-mbg").classList.add("open");
      }
      function closeCustModal() {
        document.getElementById("cust-mbg").classList.remove("open");
      }

      // ─── DEBTS ─────────────────────────────────────────────────────────────────
      function renderDebts() {
        const debts = state.items.filter(
          (i) => i.status === "collected" && !i.settledShort && balance(i) > 0,
        );
        document.getElementById("debt-alert").innerHTML = debts.length
          ? `<div class="abar"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path><path d="M13.73 21a2 2 0 0 1-3.46 0"></path></svg><div class="abar-text">${debts.length} customer${debts.length > 1 ? "s" : ""} owe you — remind them!</div></div>`
          : "";
        const el = document.getElementById("debt-list");
        if (!debts.length) {
          el.innerHTML =
            '<div class="empty"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg><p>No outstanding debts!<br>All clear 🎉</p></div>';
          return;
        }
        const total = debts.reduce((a, i) => a + balance(i), 0);
        el.innerHTML =
          `<div style="background:var(--red-l);border-radius:var(--r);padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center"><span style="font-size:12px;color:var(--red);font-weight:600">Total owed to you</span><span style="font-size:18px;font-weight:700;color:var(--red)">${fmt(total)}</span></div>` +
          debts
            .map(
              (i) =>
                `<div class="card" style="margin-bottom:9px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:9px"><div><div style="font-size:14px;font-weight:700">${i.name}</div><div class="itr-meta">${(i.fishRows || []).map((r) => r.type).join(", ") || i.type || ""}</div><div class="itr-meta">Collected: ${i.collectedAt ? shortDate(i.collectedAt) : shortDate(i.createdAt)}</div>${totalPaid(i) > 0 ? `<div class="itr-meta" style="color:var(--green)">Paid so far: ${fmt(totalPaid(i))}</div>` : ""}</div><div style="text-align:right"><div style="font-size:11px;color:var(--t3);margin-bottom:1px">Balance</div><div style="font-size:17px;font-weight:700;color:var(--red)">${fmt(balance(i))}</div></div></div><div style="display:flex;gap:7px;flex-wrap:wrap">${i.phone ? `<button class="btn sm whatsapp" onclick="sendWhatsApp('${i.phone}','${i.name}','debt',${i.id})">WhatsApp</button><button class="btn sm" onclick="callCustomer('${i.phone}','${i.name}')"><svg viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.63 3.36 2 2 0 0 1 3.6 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6.29 6.29l.95-.95a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg> Call</button>` : ""}<button class="btn sm primary" onclick="openPayModal(${i.id})">+ Payment</button><button class="btn sm" onclick="openItem(${i.id})">Details</button></div></div>`,
            )
            .join("");
      }

      // ─── ANALYTICS ─────────────────────────────────────────────────────────────
      function renderAnalytics() {
        const el = document.getElementById("analytics-content");
        if (!state.items.length) {
          el.innerHTML =
            '<div class="empty"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg><p>No data yet</p></div>';
          return;
        }
        // Best customers by total business
        const map = {};
        state.items.forEach((i) => {
          if (!map[i.name])
            map[i.name] = { name: i.name, total: 0, paid: 0, visits: 0 };
          map[i.name].total += i.total;
          map[i.name].paid += totalPaid(i);
          map[i.name].visits++;
        });
        const custs = Object.values(map)
          .sort((a, b) => b.total - a.total)
          .slice(0, 10);
        const maxTotal = custs[0]?.total || 1;
        el.innerHTML = `
    <div class="card">
      <div class="card-title"><svg viewBox="0 0 24 24"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>Best customers</div>
      ${custs
        .map(
          (c, idx) => `
        <div class="bar-wrap">
          <div class="bar-label"><span>${idx + 1}. ${c.name}</span><span>${fmt(c.total)} · ${c.visits} visit${c.visits !== 1 ? "s" : ""}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${Math.round((c.total / maxTotal) * 100)}%"></div></div>
        </div>`,
        )
        .join("")}
    </div>
    <div class="card">
      <div class="card-title"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>Payment performance</div>
      ${custs
        .map((c) => {
          const pct = c.total > 0 ? Math.round((c.paid / c.total) * 100) : 0;
          return `<div class="bar-wrap"><div class="bar-label"><span>${c.name}</span><span>${pct}% paid</span></div><div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${pct >= 100 ? "var(--green)" : pct >= 50 ? "var(--amber)" : "var(--red)"}"></div></div></div>`;
        })
        .join("")}
    </div>
    <div class="card">
      <div class="card-title"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>Overview</div>
      <div class="sum-row"><span class="sl">Total customers</span><span class="sv">${Object.keys(map).length}</span></div>
      <div class="sum-row"><span class="sl">Total intakes</span><span class="sv">${state.items.length}</span></div>
      <div class="sum-row"><span class="sl">Total charged</span><span class="sv ct">${fmt(state.items.reduce((a, i) => a + i.total, 0))}</span></div>
      <div class="sum-row"><span class="sl">Total collected</span><span class="sv" style="color:var(--green)">${fmt(state.items.reduce((a, i) => a + totalPaid(i), 0))}</span></div>
    </div>`;
      }

      // ─── WHATSAPP ──────────────────────────────────────────────────────────────
      function sendWhatsApp(phone, name, type, itemId) {
        let msg = "";
        const cleanPhone = phone.replace(/\D/g, "").replace(/^0/, "234");
        if (type === "debt" && itemId) {
          const item = state.items.find((x) => x.id === itemId);
          const bal = item ? balance(item) : 0;
          msg = `Hello ${name}, this is a reminder that you have an outstanding balance of ${fmt(bal)} for your fish drying service at Mama J's Fish Store. Kindly settle at your earliest convenience. Thank you!`;
        } else if (type === "ready" && itemId) {
          const item = state.items.find((x) => x.id === itemId);
          const fish =
            (item?.fishRows || []).map((r) => r.type).join(", ") || "your fish";
          msg = `Hello ${name}, good news! ${fish} is ready for collection at Mama J's Fish Store. Please come to collect. Thank you!`;
        } else {
          msg = `Hello ${name}, please note you have an outstanding balance at Mama J's Fish Store. Kindly come and settle. Thank you!`;
        }
        window.open(
          `https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`,
          "_blank",
        );
      }

      // ─── ITEM MODAL ─────────────────────────────────────────────────────────────
      function openItem(id) {
        const i = state.items.find((x) => x.id === id);
        if (!i) return;
        const ps = payStatus(i);
        const bal = balance(i);
        const paid = totalPaid(i);
        const fishRows = i.fishRows || [
          {
            type: i.type,
            weight: i.weight,
            count: i.count,
            price: i.price,
            discount: i.discount,
            total: i.total,
          },
        ];
        document.getElementById("modal-body").innerHTML = `
    <button class="mclose" onclick="closeModal()">Close</button>
    <div class="mtitle">${i.name}</div>
    <div class="msub"><span class="pill ${i.status}">${statusLabel(i.status)}</span>${ps ? ' <span class="pill ' + ps + '">' + payLabel(i) + "</span>" : ""}</div>
    ${fishRows.length > 1 ? `<div class="slabel">Fish items</div>${fishRows.map((r) => `<div style="background:var(--surf2);border-radius:var(--rsm);padding:8px 11px;margin-bottom:6px;font-size:13px"><div style="font-weight:600">${r.type}</div><div class="itr-meta">${r.weight ? r.weight + "kg " : ""}${r.count ? r.count + " pcs " : ""} ${r.price ? fmt(r.price) + "/kg " : ""} ${r.discount ? "Disc: " + fmt(r.discount) : ""}${r.total ? " = " + fmt(r.total) : ""}</div></div>`).join("")}` : ""}
    <table class="dtbl">
      ${fishRows.length === 1 ? `<tr><td class="dl">Fish type</td><td class="dv">${fishRows[0].type || "—"}</td></tr><tr><td class="dl">Weight</td><td class="dv">${fishRows[0].weight ? fishRows[0].weight + " kg" : "—"}</td></tr><tr><td class="dl">Count</td><td class="dv">${fishRows[0].count ? fishRows[0].count + " pcs" : "—"}</td></tr><tr><td class="dl">Price/kg</td><td class="dv">${fmt(fishRows[0].price || 0)}</td></tr>${fishRows[0].discount ? `<tr><td class="dl">Discount</td><td class="dv" style="color:var(--red)">- ${fmt(fishRows[0].discount)}</td></tr>` : "`"}` : ""}
      <tr><td class="dl" style="font-weight:600">Total charged</td><td class="dv" style="font-size:15px;font-weight:700;color:var(--teal)">${fmt(i.total)}</td></tr>
      ${i.phone ? `<tr><td class="dl">Phone</td><td class="dv" style="color:var(--teal)">${i.phone}</td></tr>` : ""}
      <tr><td class="dl">Date in</td><td class="dv">${shortDate(i.createdAt)}</td></tr>
      ${i.collectedAt ? `<tr><td class="dl">Collected</td><td class="dv">${shortDate(i.collectedAt)}</td></tr>` : ""}
      ${i.addedBy ? `<tr><td class="dl">Added by</td><td class="dv">${i.addedBy}</td></tr>` : ""}
      ${i.notes ? `<tr><td class="dl">Notes</td><td class="dv">${i.notes}</td></tr>` : ""}
    </table>
    ${i.payments?.length ? `<div class="slabel">Payments</div>${i.payments.map((p) => `<div class="pay-row"><div><div class="pay-amt">${fmt(p.amount)}</div><div class="pay-meta">${shortDate(p.date)}${p.note ? " · " + p.note : ""}</div></div></div>`).join("")}<div class="bal-box ${bal <= 0 || i.settledShort ? "clear" : ""}"><span style="font-size:12px;font-weight:600;color:${bal <= 0 || i.settledShort ? "var(--green)" : "var(--red)"}">${bal <= 0 || i.settledShort ? "Fully settled ✓" : "Remaining balance"}</span><span style="font-size:16px;font-weight:700;color:${bal <= 0 || i.settledShort ? "var(--green)" : "var(--red)"}">${i.settledShort ? "Settled" : fmt(bal)}</span></div>` : ""}
    <div class="dvdr"></div>
    ${getActions(i)}
    <div class="dvdr"></div>
    <div style="display:flex;gap:8px">
      <button class="btn" style="flex:1" onclick="startEdit(${i.id})"><svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg> Edit</button>
      <button class="btn danger" style="flex:1" onclick="confirmDelete(${i.id})"><svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6l-1 14H6L5 6"></path><path d="M10 11v6"></path><path d="M14 11v6"></path><path d="M9 6V4h6v2"></path></svg> Delete</button>
    </div>`;
        document.getElementById("modal-bg").classList.add("open");
      }

      function getActions(i) {
        let h = "";
        if (i.status === "fresh")
          h += `<button class="btn" style="margin-bottom:8px" onclick="changeStatus(${i.id},'drying')">🔥 Start drying</button>`;
        if (i.status === "drying")
          h += `<button class="btn primary" style="margin-bottom:8px" onclick="changeStatus(${i.id},'ready')"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> Mark as ready to collect</button>`;
        if (i.status === "ready") {
          h += `<button class="btn primary" style="margin-bottom:8px" onclick="changeStatus(${i.id},'collected')"><svg viewBox="0 0 24 24"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path></svg> Mark as collected</button>`;
          if (i.phone) {
            h += `<button class="btn whatsapp" style="margin-bottom:8px" onclick="sendWhatsApp('${i.phone}','${i.name}','ready',${i.id})"><svg viewBox="0 0 24 24" style="fill:none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg> WhatsApp — fish is ready</button>`;
          }
        }
        if (i.status === "collected" && !i.settledShort && balance(i) > 0) {
          h += `<button class="btn primary" style="margin-bottom:8px" onclick="openPayModal(${i.id})"><svg viewBox="0 0 24 24"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg> Record payment</button>`;
          if (i.phone)
            h += `<button class="btn whatsapp" style="margin-bottom:8px" onclick="sendWhatsApp('${i.phone}','${i.name}','debt',${i.id})"><svg viewBox="0 0 24 24" style="fill:none"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"></path></svg> WhatsApp — remind payment</button>`;
        }
        return h;
      }

      function changeStatus(id, ns) {
        const i = state.items.find((x) => x.id === id);
        if (!i) return;
        i.status = ns;
        if (ns === "collected") i.collectedAt = new Date().toISOString();
        i.editedAt = new Date().toISOString();
        lsave();
        scheduleSync();
        closeModal();
        showToast("Updated: " + statusLabel(ns));
        renderHome();
      }

      // ─── PAYMENT MODAL ──────────────────────────────────────────────────────────
      function openPayModal(id) {
        const i = state.items.find((x) => x.id === id);
        if (!i) return;
        const bal = balance(i);
        const paid = totalPaid(i);
        document.getElementById("pay-body").innerHTML = `
    <button class="mclose" onclick="closePayModal()">Close</button>
    <div class="mtitle">Record payment</div>
    <div class="msub">${i.name} — ${fmt(i.total)} total</div>
    <table class="dtbl" style="margin-bottom:11px">
      ${paid > 0 ? `<tr><td class="dl">Already paid</td><td class="dv" style="color:var(--green)">${fmt(paid)}</td></tr>` : ""}
      <tr><td class="dl" style="font-weight:600">Balance owed</td><td class="dv" style="font-weight:700;color:var(--red)">${fmt(bal)}</td></tr>
    </table>
    <div class="fg"><label class="fl">Amount received (₦) *</label><input class="fi" id="pay-amt" type="number" placeholder="0" min="0" inputmode="numeric" value="${bal}" oninput="updatePayPreview(${i.id})"></div>
    <div class="fg"><label class="fl">Note (optional)</label><input class="fi" id="pay-note" type="text" placeholder="e.g. half payment, will pay rest Friday..."></div>
    <div id="pay-preview" style="margin-bottom:11px"></div>
    <button class="btn primary" onclick="recordPayment(${i.id},false)" style="margin-bottom:8px"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> Save payment</button>
    <button class="btn" id="settle-btn" onclick="recordPayment(${i.id},true)" style="display:none;margin-bottom:8px;border-color:var(--green);color:var(--green)"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg> Save &amp; mark fully settled</button>`;
        document.getElementById("pay-mbg").classList.add("open");
        updatePayPreview(id);
      }

      function updatePayPreview(id) {
        const i = state.items.find((x) => x.id === id);
        if (!i) return;
        const amt = parseFloat(document.getElementById("pay-amt")?.value) || 0;
        const bal = balance(i);
        const newBal = Math.max(0, bal - amt);
        const sb = document.getElementById("settle-btn");
        let html = "";
        if (amt > 0) {
          if (amt >= bal) {
            html = `<div class="bal-box clear"><span style="font-size:12px;font-weight:600;color:var(--green)">Fully paid ✓</span><span style="font-size:14px;font-weight:700;color:var(--green)">No balance</span></div>`;
            if (sb) sb.style.display = "none";
          } else {
            html = `<div class="bal-box"><span style="font-size:12px;font-weight:600;color:var(--red)">Remaining balance</span><span style="font-size:14px;font-weight:700;color:var(--red)">${fmt(newBal)}</span></div>`;
            if (sb) sb.style.display = "";
          }
        }
        document.getElementById("pay-preview").innerHTML = html;
      }

      function recordPayment(id, settle) {
        const i = state.items.find((x) => x.id === id);
        if (!i) return;
        const amt = parseFloat(document.getElementById("pay-amt")?.value) || 0;
        const note = document.getElementById("pay-note")?.value.trim() || "";
        if (amt <= 0) {
          showToast("Enter the amount received");
          return;
        }
        if (!i.payments) i.payments = [];
        i.payments.push({ amount: amt, date: new Date().toISOString(), note });
        if (settle) i.settledShort = true;
        i.editedAt = new Date().toISOString();
        lsave();
        scheduleSync();
        closePayModal();
        closeModal();
        showToast(
          settle
            ? "✓ Record settled"
            : "✓ Payment of " + fmt(amt) + " recorded",
        );
        renderHome();
        renderDebts();
      }
      function closePayModal() {
        document.getElementById("pay-mbg").classList.remove("open");
      }

      // ─── MISC ──────────────────────────────────────────────────────────────────
      function callCustomer(phone, name) {
        showToast("Calling " + name + "...");
        setTimeout(() => {
          window.location.href = "tel:" + phone;
        }, 300);
      }
      function handleMBGClick(e) {
        if (e.target === document.getElementById("modal-bg")) closeModal();
      }
      function closeModal() {
        document.getElementById("modal-bg").classList.remove("open");
      }

      function showToast(msg) {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.classList.add("show");
        clearTimeout(t._t);
        t._t = setTimeout(() => t.classList.remove("show"), 2800);
      }

      // ─── SERVICE WORKER + UPDATE ────────────────────────────────────────────────
      let newWorker;
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").then((reg) => {
          reg.addEventListener("updatefound", () => {
            newWorker = reg.installing;
            newWorker.addEventListener("statechange", () => {
              if (
                newWorker.state === "installed" &&
                navigator.serviceWorker.controller
              ) {
                document.getElementById("update-banner").classList.add("show");
              }
            });
          });
        });
        navigator.serviceWorker.addEventListener("controllerchange", () =>
          window.location.reload(),
        );
      }
      function applyUpdate() {
        if (newWorker) newWorker.postMessage("skipWaiting");
      }

      const dvdr = `<div class="dvdr"></div>`;
      initApp();
    </script>
  </body>
</html>
